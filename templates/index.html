{% extends 'base.html' %}
{% block content %}
<h1>Posts</h1>
{% for post in posts %}
<div class="card my-3">
  <div class="card-body">
    <h5 class="card-title">{{ post.title }}</h5>
    <p class="card-text">{{ post.content[:200] }}{% if post.content|length > 200 %}...{% endif %}</p>
    <a href="{{ url_for('post_detail', post_id=post.id) }}" class="btn btn-primary">Read More</a>
  </div>
</div>
{% else %}
<p>No posts yet.</p>
{% endfor %}
{% endblock %}
